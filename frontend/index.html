<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Event Registration</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    width:350px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    color:#333;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0056b3;
}

</style>

</head>


<body>


<div class="container">

<h2>Event Registration</h2>


<form id="registerForm">


<input 
type="text" 
id="name" 
placeholder="Enter Name"
required>


<input 
type="email" 
id="email" 
placeholder="Enter Email"
required>


<input 
type="text" 
id="event" 
placeholder="Enter Event Name"
required>


<button type="submit">
Register
</button>


</form>


</div>



<script>


document
.getElementById("registerForm")
.addEventListener("submit", async function(e){


e.preventDefault();


try{


const response = await fetch(
"http://localhost:3000/register",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:document.getElementById("name").value,

email:document.getElementById("email").value,

event:document.getElementById("event").value

})

});



const data = await response.json();



if(response.ok){


alert("✅ Registration Successful!");


// After clicking OK open database page
window.location.href="database.html";


}

else{


alert("❌ "+data.message);


}



}

catch(error){


alert("Unable to connect to the server.");

console.log(error);


}


});


</script>


</body>
</html>
